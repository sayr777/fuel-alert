<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="sans-serif">
  <rect width="900" height="560" fill="#0C0E10"/>
  <!-- faint map grid -->
  <g stroke="#1A1E22" stroke-width="1">
    <path d="M0 120 H900 M0 240 H900 M0 360 H900 M0 480 H900"/>
    <path d="M150 0 V560 M300 0 V560 M450 0 V560 M600 0 V560 M750 0 V560"/>
  </g>

  <!-- header gradient -->
  <rect x="0" y="0" width="900" height="66" fill="#0F1113" opacity="0.85"/>
  <rect x="24" y="14" width="38" height="38" rx="10" fill="#FFC800"/>
  <text x="70" y="32" fill="#EDEFF2" font-size="15" font-weight="700">Топливный Дозор</text>
  <text x="70" y="48" fill="#93A0AC" font-size="11">Народный мониторинг АЗС</text>

  <rect x="560" y="16" width="280" height="34" rx="8" fill="#1A2332" stroke="#2A2E35"/>
  <text x="574" y="38" fill="#93A0AC" font-size="12">24 часа</text>
  <text x="644" y="38" fill="#93A0AC" font-size="12">3 дня</text>
  <rect x="700" y="20" width="60" height="26" rx="6" fill="#FFC800"/>
  <text x="712" y="38" fill="#101214" font-size="11" font-weight="700">Неделя</text>
  <text x="774" y="38" fill="#93A0AC" font-size="12">Период…</text>

  <!-- region toolbar -->
  <rect x="360" y="80" width="180" height="30" rx="8" fill="#1A2332" stroke="#2A2E35"/>
  <text x="378" y="100" fill="#EDEFF2" font-size="12">Московская область ▾</text>

  <!-- zoom control -->
  <rect x="850" y="264" width="30" height="60" rx="6" fill="#16181C" stroke="#2A2E35"/>
  <text x="860" y="288" fill="#93A0AC" font-size="16">+</text>
  <text x="860" y="316" fill="#93A0AC" font-size="16">−</text>

  <!-- markers -->
  <circle cx="230" cy="200" r="9" fill="#FF4B3E" stroke="#0C0E10" stroke-width="2"/>
  <circle cx="410" cy="300" r="9" fill="#3DDC84" stroke="#0C0E10" stroke-width="2"/>
  <circle cx="520" cy="180" r="11" fill="#5B8CFF" stroke="#0C0E10" stroke-width="2"/>
  <circle cx="330" cy="380" r="9" fill="#FFB020" stroke="#0C0E10" stroke-width="2"/>
  <circle cx="600" cy="330" r="7" fill="#8A939E" stroke="#0C0E10" stroke-width="2"/>
  <circle cx="470" cy="420" r="7" fill="#FF7A1A" stroke="#0C0E10" stroke-width="2"/>

  <!-- left filters tab -->
  <g>
    <rect x="0" y="130" width="34" height="140" rx="0 8 8 0" fill="#16181C" stroke="#2A2E35"/>
    <text x="18" y="200" fill="#93A0AC" font-size="12" writing-mode="tb" text-anchor="middle">▶ Фильтры</text>
  </g>

  <!-- right report list + legend tabs -->
  <g>
    <rect x="866" y="130" width="34" height="140" rx="8 0 0 8" fill="#16181C" stroke="#2A2E35"/>
    <text x="882" y="200" fill="#93A0AC" font-size="12" writing-mode="tb" text-anchor="middle">◀ Список (6)</text>

    <rect x="866" y="420" width="34" height="120" rx="8 0 0 8" fill="#16181C" stroke="#2A2E35"/>
    <text x="882" y="480" fill="#93A0AC" font-size="12" writing-mode="tb" text-anchor="middle">◀ Легенда</text>
  </g>
</svg>
