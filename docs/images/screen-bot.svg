<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 600" font-family="sans-serif">
  <rect width="340" height="600" rx="28" fill="#0E1621"/>
  <rect x="6" y="6" width="328" height="588" rx="22" fill="none" stroke="#26292E" stroke-width="6"/>

  <!-- telegram header -->
  <rect x="6" y="6" width="328" height="64" rx="22 22 0 0" fill="#17212B"/>
  <circle cx="40" cy="40" r="16" fill="#FFC800"/>
  <text x="40" y="45" fill="#101214" font-size="13" font-weight="800" text-anchor="middle">Д</text>
  <text x="66" y="36" fill="#EDEFF2" font-size="13" font-weight="600">Топливный Дозор</text>
  <text x="66" y="52" fill="#6BA1CC" font-size="11">бот · онлайн</text>

  <!-- incoming bubble -->
  <rect x="24" y="94" width="260" height="46" rx="12" fill="#182533"/>
  <text x="36" y="122" fill="#EDEFF2" font-size="12">Что случилось? Выберите тип события:</text>

  <!-- inline keyboard grid -->
  <g font-size="10.5" fill="#CFE3F5">
    <rect x="24" y="150" width="126" height="30" rx="7" fill="#3B6E9E" opacity="0.35"/>
    <text x="34" y="169">● Топлива нет</text>
    <rect x="158" y="150" width="126" height="30" rx="7" fill="#3B6E9E" opacity="0.35"/>
    <text x="168" y="169">● Топливо есть</text>

    <rect x="24" y="186" width="126" height="30" rx="7" fill="#3B6E9E" opacity="0.35"/>
    <text x="34" y="205">● Лимит отпуска</text>
    <rect x="158" y="186" width="126" height="30" rx="7" fill="#3B6E9E" opacity="0.35"/>
    <text x="168" y="205">● Завышенная цена</text>

    <rect x="24" y="222" width="126" height="30" rx="7" fill="#3B6E9E" opacity="0.35"/>
    <text x="34" y="241">● Незаконная торговля</text>
    <rect x="158" y="222" width="126" height="30" rx="7" fill="#3B6E9E" opacity="0.35"/>
    <text x="168" y="241">● АЗС закрыта</text>
  </g>

  <!-- outgoing bubble -->
  <rect x="120" y="270" width="164" height="38" rx="12" fill="#2B5278"/>
  <text x="134" y="294" fill="#EDEFF2" font-size="12">Топливо отсутствует</text>

  <!-- next question -->
  <rect x="24" y="322" width="260" height="46" rx="12" fill="#182533"/>
  <text x="36" y="342" fill="#EDEFF2" font-size="12">Какие марки топлива?</text>
  <text x="36" y="358" fill="#EDEFF2" font-size="12">Можно выбрать несколько:</text>

  <g font-size="11" fill="#CFE3F5">
    <rect x="24" y="378" width="80" height="28" rx="6" fill="#3B6E9E" opacity="0.35"/>
    <text x="40" y="396">АИ-92 ✓</text>
    <rect x="112" y="378" width="80" height="28" rx="6" fill="#3B6E9E" opacity="0.35"/>
    <text x="128" y="396">АИ-95 ✓</text>
    <rect x="200" y="378" width="84" height="28" rx="6" fill="#3B6E9E" opacity="0.35"/>
    <text x="222" y="396">ДТ</text>
  </g>

  <rect x="24" y="416" width="260" height="30" rx="7" fill="#FFC800" opacity="0.9"/>
  <text x="128" y="436" fill="#101214" font-size="11" font-weight="700">✔️ Готово</text>
</svg>
