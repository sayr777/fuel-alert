# Production docker-compose for Yandex Cloud VM.
# Object Storage (S3) is provided by Yandex Cloud — no MinIO needed.
# TLS termination: configure on the host (certbot + nginx) or via Yandex ALB.
#
# Usage:
#   cp .env.example .env && nano .env
#   docker compose up -d
#   docker compose --profile bot up -d   # also start the Telegram bot

services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${DB_USER:-fuelwatch}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-fuelwatch}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fuelwatch} -d ${DB_NAME:-fuelwatch}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api-init:
    build:
      context: ../backend
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-fuelwatch}:${DB_PASSWORD}@db:5432/${DB_NAME:-fuelwatch}
    command: python scripts/init_db.py
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ../backend
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-fuelwatch}:${DB_PASSWORD}@db:5432/${DB_NAME:-fuelwatch}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}
      S3_USE_SSL: "true"
      MODERATOR_TOKEN: ${MODERATOR_TOKEN}
      CORS_ORIGINS: '["${DOMAIN_ORIGIN}"]'
    depends_on:
      api-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      args:
        VITE_TELEGRAM_BOT_URL: ${VITE_TELEGRAM_BOT_URL}
        VITE_USE_MOCKS: "false"
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

  bot:
    build: ../bot
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      API_BASE_URL: http://api:8000/api/v1
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - bot

volumes:
  pgdata:
  redisdata:
