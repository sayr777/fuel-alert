<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="sans-serif">
  <rect width="900" height="560" fill="#0F1113"/>
  <rect y="0" width="900" height="10" fill="#FFC800" opacity="0.9"/>
  <!-- header -->
  <text x="32" y="42" fill="#EDEFF2" font-size="17" font-weight="700">ТОПЛИВНЫЙ ДОЗОР<tspan fill="#FFC800">.</tspan></text>
  <text x="560" y="42" fill="#93A0AC" font-size="13">События</text>
  <text x="650" y="42" fill="#93A0AC" font-size="13">Бот</text>
  <text x="710" y="42" fill="#93A0AC" font-size="13">Карта</text>
  <text x="780" y="42" fill="#93A0AC" font-size="13">Модерация</text>

  <!-- hero -->
  <text x="32" y="130" fill="#93A0AC" font-size="12" letter-spacing="2">НАРОДНЫЙ МОНИТОРИНГ АЗС</text>
  <text x="30" y="185" fill="#EDEFF2" font-size="42" font-weight="800">Куда пропал бензин —</text>
  <text x="30" y="230" fill="#FFC800" font-size="42" font-weight="800">знают водители</text>
  <rect x="32" y="255" width="520" height="14" rx="4" fill="#2A2E35"/>
  <rect x="32" y="277" width="460" height="14" rx="4" fill="#2A2E35"/>

  <rect x="32" y="315" width="170" height="42" rx="10" fill="#FFC800"/>
  <text x="55" y="341" fill="#101214" font-size="14" font-weight="700">Сообщить в боте</text>
  <rect x="215" y="315" width="150" height="42" rx="10" fill="none" stroke="#3A3F47"/>
  <text x="238" y="341" fill="#EDEFF2" font-size="14">Открыть карту</text>

  <!-- feature chips -->
  <g font-size="11" fill="#93A0AC">
    <rect x="32" y="380" width="150" height="30" rx="15" fill="none" stroke="#2A2E35"/>
    <circle cx="48" cy="395" r="4" fill="#FF4B3E"/>
    <text x="60" y="399">9 типов событий</text>
    <rect x="192" y="380" width="140" height="30" rx="15" fill="none" stroke="#2A2E35"/>
    <text x="204" y="399">Фото — не более 2</text>
    <rect x="342" y="380" width="210" height="30" rx="15" fill="none" stroke="#2A2E35"/>
    <text x="354" y="399">Геопозиция и время обязательны</text>
  </g>

  <!-- classifier cards -->
  <g>
    <rect x="32" y="440" width="260" height="90" rx="10" fill="#16181C" stroke="#2A2E35"/>
    <circle cx="52" cy="462" r="5" fill="#FF4B3E"/>
    <text x="66" y="466" fill="#FF4B3E" font-size="10" font-family="monospace">NO_FUEL</text>
    <text x="50" y="490" fill="#EDEFF2" font-size="14" font-weight="600">Топливо отсутствует</text>
    <rect x="50" y="502" width="190" height="8" rx="3" fill="#2A2E35"/>

    <rect x="312" y="440" width="260" height="90" rx="10" fill="#16181C" stroke="#2A2E35"/>
    <circle cx="332" cy="462" r="5" fill="#3DDC84"/>
    <text x="346" y="466" fill="#3DDC84" font-size="10" font-family="monospace">FUEL_AVAILABLE</text>
    <text x="330" y="490" fill="#EDEFF2" font-size="14" font-weight="600">Топливо в наличии</text>
    <rect x="330" y="502" width="190" height="8" rx="3" fill="#2A2E35"/>

    <rect x="592" y="440" width="260" height="90" rx="10" fill="#16181C" stroke="#2A2E35"/>
    <circle cx="612" cy="462" r="5" fill="#C554FF"/>
    <text x="626" y="466" fill="#C554FF" font-size="10" font-family="monospace">ILLEGAL_SALE</text>
    <text x="610" y="490" fill="#EDEFF2" font-size="14" font-weight="600">Незаконная торговля</text>
    <rect x="610" y="502" width="190" height="8" rx="3" fill="#2A2E35"/>
  </g>
</svg>
