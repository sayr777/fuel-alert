services:
  db:
    image: kartoza/postgis:16-3.4
    environment:
      POSTGRES_USER: fuelwatch
      POSTGRES_PASS: fuelwatch
      POSTGRES_DBNAME: fuelwatch
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fuelwatch"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: fuelwatch
      MINIO_ROOT_PASSWORD: fuelwatch123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 fuelwatch fuelwatch123 &&
      mc mb --ignore-existing local/fuel-watch-photos &&
      mc anonymous set download local/fuel-watch-photos
      "

  api-init:
    build:
      context: ./backend
      network: host
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql+asyncpg://fuelwatch:fuelwatch@db:5432/fuelwatch
    command: >
      sh -c "python scripts/init_db.py &&
             python scripts/seed_demo.py;
             python scripts/seed_stations.py || true"
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ./backend
      network: host
    ports:
      - "8000:8000"
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql+asyncpg://fuelwatch:fuelwatch@db:5432/fuelwatch
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: fuelwatch
      S3_SECRET_KEY: fuelwatch123
      S3_BUCKET: fuel-watch-photos
      S3_PUBLIC_URL: http://localhost:9000/fuel-watch-photos
      MODERATOR_TOKEN: change-me-moderator-token
    depends_on:
      api-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  bot:
    build: ./bot
    environment:
      BOT_TOKEN: ${BOT_TOKEN:-}
      API_BASE_URL: http://api:8000/api/v1
      REDIS_URL: redis://redis:6379/0
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - bot

volumes:
  pgdata:
  miniodata: